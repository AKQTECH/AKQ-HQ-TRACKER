<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connecting to Dropbox...</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; margin: 0;
      background: #FFF4F8; color: #333; text-align: center;
    }
    .msg { font-size: 1.1em; color: #EA258D; font-weight: 700; }
    .sub { font-size: 0.85em; color: #999; margin-top: 8px; }
  </style>
</head>
<body>
  <div>
    <div class="msg" id="msg">Connected! Returning to HQ...</div>
    <div class="sub" id="sub">You can close this window if it doesn't close automatically.</div>
  </div>
  <script>
    const params = new URLSearchParams(location.search);
    const code  = params.get('code');
    const error = params.get('error');
    const state = params.get('state');

    if (window.opener) {
      // Popup flow — send code back to PWA via postMessage then close
      try {
        window.opener.postMessage(
          { type: 'dropbox_oauth_callback', code: code || null, error: error || null },
          '*'
        );
      } catch(e) {}
      setTimeout(() => window.close(), 1200);
    } else {
      // window.opener is null (some iOS versions strip it on popup).
      // Store the code in localStorage so the PWA picks it up on visibilitychange.
      if (code) {
        try {
          localStorage.setItem('akq_hq_dbx_pending_code', JSON.stringify({
            code, state, ts: Date.now()
          }));
          document.getElementById('msg').textContent = 'Connected! Return to your HQ app.';
          document.getElementById('sub').textContent = 'Tap the HQ icon on your homescreen to finish connecting.';
        } catch(e) {
          document.getElementById('msg').textContent = 'Something went wrong.';
          document.getElementById('sub').textContent = 'Close this and try connecting again.';
        }
      } else if (error) {
        document.getElementById('msg').textContent = 'Dropbox cancelled.';
        document.getElementById('sub').textContent = 'Close this and try connecting again.';
      }
    }
  </script>
</body>
</html>
