<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'none';
      script-src 'unsafe-inline' 'unsafe-eval' https://unpkg.com;
      style-src 'unsafe-inline' https://fonts.googleapis.com;
      font-src https://fonts.gstatic.com;
      img-src 'self' data: blob:;
      manifest-src 'self';
      connect-src https://api.dropboxapi.com https://content.dropboxapi.com https://api.dropbox.com https://www.dropbox.com;
      object-src 'none';
      base-uri 'self';
      form-action 'none';
    ">
    <title>PICK ME WRITERS ASSISTANT 💋</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon_32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon_16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        button { color: inherit; }

        :root {
            --neon-pink: #EA258D;
            --hot-pink: #FF1493;
            --light-pink: #F37EB3;
            --bright-yellow: #FFEB3B;
            --golden: #F5952D;
            --lavender: #CACBDF;
            --mauve: #FFB6D9;
            --dusty-rose: #FFC0CB;
            --white: #FFFFFF;
            --cream: #FFFBF8;
            --black: #000000;
            --dark-gray: #1A1A1A;
            --card-bg: #FFFFFF;
            --text-dark: #000000;
            --text-mid: #333333;
            --text-light: #666666;
            --border-pink: #FFB6D9;
            --accent-pink: #EA258D;
            --accent-yellow: #FFEB3B;
            --accent-lavender: #CACBDF;
        }

        /* ── MOBILE FIRST: these are the base styles, not overrides ── */
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #FFB6D9;
            min-height: 100vh;
            padding: 10px 8px;
            color: var(--text-dark);
            position: relative;
        }
        /* Prevent iOS zoom on focus — every interactive text input MUST be 16px+ */
        input, textarea, select, div[contenteditable] {
            font-size: 16px !important;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: none;
            pointer-events: none;
            z-index: -1;
        }

        .container { max-width: 640px; margin: 0 auto; }

        /* HEADER — compact on mobile */
        .header {
            text-align: center;
            margin-bottom: 14px;
            padding: 14px 12px 10px;
            background: var(--white);
            border-radius: 0;
            border: none;
            box-shadow: none;
            position: relative;
            overflow: visible;
        }
        .header::before {
            content: '';
            position: absolute;
            top: 0; right: 0;
            width: 0; height: 0;
            background: none;
            border-radius: 0;
        }
        .header-lip { font-size: 1.8em; margin-bottom: 8px; }
        .header h1 {
            font-family: 'Inter', sans-serif;
            font-size: 1.4em;
            font-weight: 900;
            color: var(--black);
            letter-spacing: -0.02em;
            text-transform: uppercase;
            margin-bottom: 10px;
            position: relative;
            z-index: 1;
            line-height: 1.2;
        }
        .header-sub {
            font-size: 0.78em;
            color: var(--text-light);
            font-style: italic;
            opacity: 1;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            position: relative;
            z-index: 1;
        }

        /* TABS */
        .tabs {
            margin-bottom: 20px;
            background: transparent;
            padding: 0;
        }
        .tab-select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--black);
            background: var(--white);
            color: var(--text-dark);
            font-family: 'Inter', sans-serif;
            font-size: 0.9em;
            font-weight: 700;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 0.02em;
            text-transform: uppercase;
        }
        .tab-select:focus {
            outline: none;
            border-color: var(--neon-pink);
            box-shadow: none;
            background: var(--white);
        }
        .tab-select:hover {
            background: #EA258D;
            border-color: #EA258D;
            color: var(--white);
        }

        /* PROGRESS BAR HEADER */
        .progress-bar-container {
            background: rgba(243, 126, 179, 0.08);
            border: 1px solid rgba(243, 126, 179, 0.2);
            border-radius: 4px;
            padding: 12px 16px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 0.85em;
        }
        .progress-bar-container.hidden {
            display: none;
        }
        .progress-feature-name {
            font-weight: 700;
            color: var(--text-dark);
            min-width: 180px;
            white-space: nowrap;
        }
        .progress-stats {
            color: var(--text-light);
            font-size: 0.8em;
            min-width: 60px;
        }
        .progress-bar-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .progress-bar-track {
            flex: 1;
            height: 6px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 3px;
            overflow: hidden;
        }
        .progress-bar-fill {
            display: block;
            height: 100%;
            background: #EA258D !important;
            border-radius: 3px;
            transition: width 0.3s ease;
        }
        .progress-toggle-btn {
            background: none;
            border: none;
            color: var(--text-light);
            cursor: pointer;
            font-size: 0.9em;
            padding: 0;
            transition: color 0.2s ease;
        }
        .progress-toggle-btn:hover {
            color: var(--neon-pink);
        }

        /* CARD */
        .card {
            background: var(--white);
            border-radius: 8px;
            padding: 32px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
            border: none;
        }

        /* BUTTONS */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 0.02em;
        }
        .btn-primary {
            background: #fec3e4;
            color: #ea258d;
            box-shadow: 0 4px 12px rgba(254, 195, 228, 0.3);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(254, 195, 228, 0.4); }
        .btn-secondary {
            background: var(--white);
            color: var(--black);
            border: 2px solid var(--neon-pink);
            box-shadow: none;
        }
        .btn-secondary:hover { background: var(--light-pink); color: var(--black); }
        .btn-notion {
            background: #fec3e4;
            color: #ea258d;
            box-shadow: 0 4px 12px rgba(254, 195, 228, 0.3);
        }
        .btn-notion:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(254, 195, 228, 0.4); }
        .btn-yes {
            background: var(--neon-pink);
            color: white;
            padding: 14px 48px;
            font-size: 1.05em;
            box-shadow: 0 4px 12px rgba(234, 37, 141, 0.3);
            border: none;
        }
        .btn-yes:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(234, 37, 141, 0.4); }
        .btn-no {
            background: var(--white);
            color: var(--black);
            padding: 14px 48px;
            font-size: 1.05em;
            box-shadow: none;
            border: 2px solid var(--black);
        }
        .btn-no:hover { background: #FFB6D9; border-color: var(--black); }
        .btn-skip {
            background: transparent;
            color: var(--text-light);
            border: 1px dashed var(--border-rose);
            padding: 8px 20px;
            font-size: 0.85em;
        }
        .btn-skip:hover { background: var(--blush); }
        .btn-restart {
            background: var(--blush);
            color: var(--text-dark);
            border: 1px solid var(--border-rose);
        }
        .btn-restart:hover { background: var(--petal); }

        /* INPUTS */
        input, textarea, select {
            font-family: 'Inter', sans-serif;
            font-size: 0.95em;
            padding: 12px 16px;
            border: 2px solid var(--black);
            border-radius: 6px;
            background: white;
            color: var(--text-dark);
            transition: all 0.3s ease;
            width: 100%;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--neon-pink);
            box-shadow: none;
            background: white;
        }
        label {
            font-size: 0.85em;
            font-weight: 600;
            color: var(--text-mid);
            display: block;
            margin-bottom: 5px;
        }

        /* SECTION TITLE */
        .section-title {
            font-family: 'Inter', sans-serif;
            font-size: 1.8em;
            font-weight: 900;
            color: var(--black);
            margin-bottom: 28px;
            display: flex;
            align-items: center;
            gap: 12px;
            text-transform: uppercase;
            letter-spacing: -0.01em;
        }
        .section-title::after {
            content: '';
            flex: 1;
            height: 2px;
            background: var(--black);
            border-radius: 0;
        }

        /* PLAYLIST */
        .playlist-controls { display: flex; gap: 10px; margin-bottom: 22px; flex-wrap: wrap; align-items: center; }
        .song-count-badge {
            margin-left: auto;
            background: #fec3e4;
            color: #ea258d;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(254, 195, 228, 0.3);
        }
        .songs-grid { display: grid; gap: 14px; }
        .song-card {
            background: linear-gradient(135deg, white 0%, var(--off-white) 100%);
            border-radius: 8px;
            border: 1px solid var(--border-warm);
            padding: 18px;
            display: grid;
            grid-template-columns: 36px 56px 1fr;
            gap: 14px;
            align-items: start;
            transition: all 0.3s ease;
            cursor: default;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .song-card:hover {
            border-color: var(--terra);
            box-shadow: 0 8px 24px rgba(184, 102, 74, 0.12);
            transform: translateY(-2px);
        }
        .song-card.drag-over {
            border-color: var(--hot-pink);
            border-style: dashed;
            background: var(--card-bg);
        }
        .song-card.dragging { opacity: 0.4; }
        .drag-handle {
            display: flex;
            flex-direction: column;
            gap: 3px;
            padding-top: 6px;
            cursor: grab;
            color: var(--text-light);
            opacity: 0.5;
            align-items: center;
        }
        .drag-handle:active { cursor: grabbing; }
        .drag-handle span {
            display: block;
            width: 18px;
            height: 2px;
            background: currentColor;
            border-radius: 2px;
        }
        .song-num {
            font-size: 0.75em;
            color: var(--text-light);
            text-align: center;
            margin-top: 2px;
        }
        .song-icon {
            width: 52px;
            height: 52px;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--deep-rose), var(--hot-pink));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }
        .song-title { font-size: 1em; font-weight: 600; color: var(--text-dark); margin-bottom: 2px; }
        .song-artist { font-size: 0.85em; color: var(--text-mid); margin-bottom: 2px; }
        .song-album { font-size: 0.78em; color: var(--text-light); margin-bottom: 10px; }
        .meaning-label { color: var(--hot-pink) !important; font-size: 0.8em !important; }
        textarea.meaning-area {
            min-height: 56px;
            resize: vertical;
            font-size: 0.9em;
            padding: 8px 12px;
        }

        /* TOAST */
        .toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--neon-pink);
            color: white;
            padding: 14px 32px;
            border-radius: 6px;
            font-size: 0.95em;
            font-weight: 700;
            letter-spacing: 0.02em;
            box-shadow: 0 8px 24px rgba(234, 37, 141, 0.3);
            transition: transform 0.4s cubic-bezier(0.23, 1, 0.320, 1);
            z-index: 999;
            pointer-events: none;
            border: none;
            text-transform: uppercase;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        /* EVALUATION */
        .eval-step0, .eval-categories, .eval-question, .eval-result { max-width: 700px; margin: 0 auto; }

        .eval-step-label {
            font-size: 0.75em;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-light);
            margin-bottom: 6px;
        }
        .eval-scene-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.8em;
            color: var(--terra);
            font-style: italic;
            margin-bottom: 24px;
            font-weight: 600;
        }

        .cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0 24px; }
        .cat-card {
            padding: 20px;
            border: 2px solid var(--border-warm);
            border-radius: 8px;
            background: linear-gradient(135deg, white 0%, var(--off-white) 100%);
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .cat-card:hover {
            border-color: var(--taupe);
            background: linear-gradient(135deg, var(--card-bg), var(--cream));
            box-shadow: 0 6px 16px rgba(184, 102, 74, 0.1);
            transform: translateY(-2px);
        }
        .cat-card.selected {
            border-color: var(--terra);
            background: linear-gradient(135deg, var(--cream), var(--mauve));
            box-shadow: 0 8px 24px rgba(184, 102, 74, 0.2), 0 0 0 4px rgba(184, 102, 74, 0.08);
            transform: translateY(-2px);
        }
        .cat-icon { font-size: 1.8em; margin-bottom: 6px; }
        .cat-name { font-weight: 700; font-size: 0.9em; color: var(--text-dark); margin-bottom: 4px; }
        .cat-desc { font-size: 0.78em; color: var(--text-mid); line-height: 1.4; }

        .progress-bar-wrap {
            background: var(--mauve);
            border-radius: 10px;
            height: 6px;
            margin-bottom: 10px;
            overflow: hidden;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        .eval-question .progress-bar-fill {
            height: 100%;
            background: linear-gradient(to right, var(--terra), var(--rust));
            border-radius: 10px;
            transition: width 0.4s ease;
        }
        .progress-label { font-size: 0.8em; color: var(--text-light); margin-bottom: 28px; }

        .question-section {
            font-size: 0.75em;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--hot-pink);
            margin-bottom: 10px;
        }
        .question-text {
            font-family: 'Playfair Display', serif;
            font-size: 1.5em;
            line-height: 1.5;
            color: var(--text-dark);
            margin-bottom: 8px;
        }
        .question-sub {
            font-size: 0.88em;
            color: var(--text-light);
            margin-bottom: 32px;
            line-height: 1.5;
            font-style: italic;
        }
        .quiz-btns { display: flex; gap: 14px; justify-content: center; align-items: center; flex-wrap: wrap; }

        .flag-strip {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .flag-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.78em;
            font-weight: 600;
        }
        .flag-keep { background: #D4EFDF; color: #1A7A42; }
        .flag-warn { background: #FDEBD0; color: #884A00; }
        .flag-cut  { background: #FADBD8; color: #922B21; }

        /* RESULT */
        .result-verdict {
            padding: 36px;
            border-radius: 12px;
            margin-bottom: 28px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.12);
        }
        .verdict-keep {
            background: linear-gradient(135deg, #D4EFDF 0%, #A9DFBF 100%);
            border: 2px solid #27AE60;
            box-shadow: 0 8px 32px rgba(39, 174, 96, 0.15);
        }
        .verdict-rewrite {
            background: linear-gradient(135deg, #F0D7A8 0%, #E8C592 100%);
            border: 2px solid var(--terra);
            box-shadow: 0 8px 32px rgba(184, 102, 74, 0.15);
        }
        .verdict-cut {
            background: linear-gradient(135deg, #FADBD8 0%, #F5B7B1 100%);
            border: 2px solid #E74C3C;
            box-shadow: 0 8px 32px rgba(231, 76, 60, 0.15);
        }
        .verdict-icon { font-size: 2.8em; margin-bottom: 10px; }
        .verdict-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.8em;
            font-weight: 700;
            margin-bottom: 10px;
        }
        .verdict-keep .verdict-title { color: #1A5E30; }
        .verdict-rewrite .verdict-title { color: var(--terra); }
        .verdict-cut .verdict-title { color: #922B21; }
        .verdict-notes { font-size: 0.95em; line-height: 1.7; color: #2C2C2C; }
        .verdict-notes li { margin-bottom: 6px; margin-left: 20px; }

        .flag-summary {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 16px 0;
            flex-wrap: wrap;
        }
        .flag-count {
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.88em;
            text-align: center;
        }
        .fc-keep { background: #D4EFDF; color: #1A7A42; }
        .fc-warn { background: #FDEBD0; color: #884A00; }
        .fc-cut  { background: #FADBD8; color: #922B21; }

        .result-notes-area { margin-top: 20px; }
        .result-notes-area textarea { min-height: 80px; resize: vertical; }
        .result-actions { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; justify-content: flex-end; }

        /* SCENE NOTES */
        .notes-controls { display: flex; gap: 10px; margin-bottom: 22px; flex-wrap: wrap; align-items: flex-end; }
        .notes-grid { display: grid; gap: 14px; }
        .note-card {
            background: linear-gradient(135deg, white 0%, var(--off-white) 100%);
            border: 1px solid var(--border-warm);
            border-radius: 8px;
            padding: 18px 20px;
            position: relative;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .note-card:hover {
            border-color: var(--terra);
            box-shadow: 0 6px 18px rgba(184, 102, 74, 0.12);
            transform: translateY(-2px);
        }
        .note-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .note-scene-tag {
            background: #fec3e4;
            color: #ea258d;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 600;
            white-space: nowrap;
        }
        .note-delete {
            margin-left: auto;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-light);
            font-size: 1.1em;
            padding: 2px 6px;
            border-radius: 4px;
            transition: background 0.15s;
        }
        .note-delete:hover { background: #FADBD8; color: #C0392B; }
        .note-content {
            font-size: 0.93em;
            color: var(--text-dark);
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .add-note-form {
            background: var(--card-bg);
            border: 1.5px dashed var(--border-rose);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .add-note-form-grid { display: grid; grid-template-columns: 200px 1fr; gap: 14px; align-items: start; }
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: var(--text-light);
        }
        .empty-state-icon { font-size: 2.5em; margin-bottom: 10px; opacity: 0.5; }
        .empty-state-text { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.05em; }

        /* SETTINGS */
        .settings-section { max-width: 600px; }
        .settings-field { margin-bottom: 20px; }
        .settings-hint { font-size: 0.8em; color: var(--text-light); margin-top: 5px; font-style: italic; }

        /* ── MOBILE DEFAULTS (no media query — this file IS mobile) ── */
        .container { max-width: 100%; }
        .cat-grid { grid-template-columns: 1fr; }
        .add-note-form-grid { grid-template-columns: 1fr; }
        .song-card { grid-template-columns: 28px 44px 1fr; gap: 8px; }

        /* Progress bar */
        .progress-bar-container { padding: 8px 10px; font-size: 0.78em; }
        .progress-feature-name { min-width: 100px; font-size: 0.78em; }

        /* Scene cards — compact, no square aspect ratio */
        .scenes-grid { grid-template-columns: 1fr; gap: 10px; }
        .scene-card {
            min-height: auto !important;
            aspect-ratio: unset !important;
            padding: 12px;
            flex-direction: column;
        }
        .scene-card-label { font-size: 0.75em; }
        .scene-drag-handle { display: none; }

        /* Scene Notes accordion (handled in React component) */
        .scene-notes-grid { grid-template-columns: 1fr !important; }
        .scene-notes-grid > div:first-child {
            border-right: none !important;
            padding-right: 0 !important;
        }

        /* Card general */
        .card { padding: 14px 10px; margin-bottom: 10px; }

        /* SCENE CARDS (NEW) */
        .scenes-grid {

/* ══════════════════════════════════════════════════════════════════════════════
   DROPBOX SYNC MODULE — OAuth PKCE flow, no client secret needed.
   Files live at pickme-data.json in your Dropbox app folder.
   ⚠️  After registering at https://www.dropbox.com/developers/apps,
       replace __DROPBOX_APP_KEY__ below with your App Key.
   ══════════════════════════════════════════════════════════════════════════════ */
const DBX = (() => {
  const APP_KEY      = 'ihs603r1u305x3s';
  const KEY_TOKENS   = 'akq_pickme_dbx_tokens';
  const KEY_PKCE     = 'akq_pickme_dbx_pkce';
  const KEY_FILEID   = 'akq_pickme_dbx_fileid';
  const PICKME_PATH  = '/PICK ME/pickme-data.json';

  let st = { accessToken: null, refreshToken: null, expiresAt: 0, account: null, fileId: null };

  function b64url(buf) {
    return btoa(String.fromCharCode(...new Uint8Array(buf)))
      .replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
  }
  async function sha256(str) {
    return b64url(await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str)));
  }
  function randVerifier(len=64) {
    const chars='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~';
    let s=''; const arr=new Uint8Array(len); crypto.getRandomValues(arr);
    for(let i=0;i<len;i++) s+=chars[arr[i]%chars.length]; return s;
  }
  function getRedirectUri() { const u=new URL(location.href); u.search=''; u.hash=''; return u.href; }

  function load() {
    try {
      const raw = localStorage.getItem(KEY_TOKENS);
      if (raw) { const t=JSON.parse(raw); st.accessToken=t.accessToken||null; st.refreshToken=t.refreshToken||null; st.expiresAt=t.expiresAt||0; st.account=t.account||null; }
      st.fileId = localStorage.getItem(KEY_FILEID) || null;
    } catch(e) { console.warn('DBX load failed:', e); }
  }
  function saveTokens() {
    localStorage.setItem(KEY_TOKENS, JSON.stringify({ accessToken:st.accessToken, refreshToken:st.refreshToken, expiresAt:st.expiresAt, account:st.account }));
    if (st.fileId) localStorage.setItem(KEY_FILEID, st.fileId);
  }
  function clearTokens() {
    localStorage.removeItem(KEY_TOKENS); localStorage.removeItem(KEY_FILEID);
    st = { accessToken:null, refreshToken:null, expiresAt:0, account:null, fileId:null };
  }

  function isConfigured() { return APP_KEY && APP_KEY !== '__DROPBOX_APP_KEY__'; }
  function isConnected()   { return !!st.refreshToken; }
  function account()       { return st.account; }

  async function startOAuth() {
    if (!isConfigured()) {
      alert("Dropbox isn't set up yet.\n\nYou need to:\n1. Register an app at https://www.dropbox.com/developers/apps\n2. Paste its App Key into this file (search for __DROPBOX_APP_KEY__)");
      return;
    }
    const verifier = randVerifier(); const challenge = await sha256(verifier);
    sessionStorage.setItem(KEY_PKCE, verifier);
    const params = new URLSearchParams({ response_type:'code', client_id:APP_KEY, code_challenge:challenge, code_challenge_method:'S256', redirect_uri:getRedirectUri(), token_access_type:'offline' });
    location.href = `https://www.dropbox.com/oauth2/authorize?${params.toString()}`;
  }

  async function handleCallback() {
    const url = new URL(location.href);
    const code = url.searchParams.get('code'); const error = url.searchParams.get('error');
    if (error) { url.searchParams.delete('error'); url.searchParams.delete('error_description'); history.replaceState(null,'',url.href); alert('Dropbox cancelled: '+error); return false; }
    if (!code) return false;
    const verifier = sessionStorage.getItem(KEY_PKCE); sessionStorage.removeItem(KEY_PKCE);
    url.searchParams.delete('code'); url.searchParams.delete('state'); history.replaceState(null,'',url.href);
    if (!verifier) return false;
    const body = new URLSearchParams({ code, grant_type:'authorization_code', client_id:APP_KEY, redirect_uri:getRedirectUri(), code_verifier:verifier });
    const r = await fetch('https://api.dropbox.com/oauth2/token', { method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body });
    if (!r.ok) { alert('Could not finish Dropbox connection. Try again.'); return false; }
    const t = await r.json();
    st.accessToken=t.access_token; st.refreshToken=t.refresh_token; st.expiresAt=Date.now()+(t.expires_in||14400)*1000;
    try { const acct=await apiCall('/users/get_current_account',null); st.account={name:acct.name?.display_name||'—',email:acct.email||''}; } catch(e){ st.account=null; }
    saveTokens(); return true;
  }

  async function refreshIfNeeded() {
    if (!st.refreshToken) throw new Error('Not connected');
    if (st.accessToken && Date.now() < st.expiresAt-30000) return;
    const body = new URLSearchParams({ grant_type:'refresh_token', refresh_token:st.refreshToken, client_id:APP_KEY });
    const r = await fetch('https://api.dropbox.com/oauth2/token', { method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body });
    if (!r.ok) { clearTokens(); throw new Error('Dropbox session expired — please reconnect'); }
    const t = await r.json(); st.accessToken=t.access_token; st.expiresAt=Date.now()+(t.expires_in||14400)*1000; saveTokens();
  }

  async function apiCall(endpoint, argsObj) {
    await refreshIfNeeded();
    const r = await fetch('https://api.dropboxapi.com/2'+endpoint, { method:'POST', headers:{'Authorization':'Bearer '+st.accessToken,'Content-Type':'application/json'}, body:argsObj?JSON.stringify(argsObj):'null' });
    if (!r.ok) { const txt=await r.text(); throw new Error(`DBX ${endpoint} ${r.status}: ${txt}`); }
    return r.json();
  }

  async function uploadPath(path, content) {
    await refreshIfNeeded();
    const arg = { path, mode:{'.tag':'overwrite'}, autorename:false, mute:true, strict_conflict:false };
    const r = await fetch('https://content.dropboxapi.com/2/files/upload', { method:'POST', headers:{'Authorization':'Bearer '+st.accessToken,'Dropbox-API-Arg':JSON.stringify(arg),'Content-Type':'application/octet-stream'}, body:typeof content==='string'?new Blob([content]):content });
    if (!r.ok) { const txt=await r.text(); throw new Error(`DBX upload ${path} ${r.status}: ${txt}`); }
    return r.json();
  }

  async function getPathById(id) {
    try { const m=await apiCall('/files/get_metadata',{path:id}); return m.path_display||null; } catch(e){ return null; }
  }

  async function uploadSmart(content) {
    let path = PICKME_PATH;
    if (st.fileId) { const cur=await getPathById(st.fileId); if(cur) path=cur; }
    const res = await uploadPath(path, content);
    st.fileId=res.id; localStorage.setItem(KEY_FILEID, res.id); return res;
  }

  async function downloadPath(path) {
    await refreshIfNeeded();
    const r = await fetch('https://content.dropboxapi.com/2/files/download', { method:'POST', headers:{'Authorization':'Bearer '+st.accessToken,'Dropbox-API-Arg':JSON.stringify({path})} });
    if (r.status===409) return null;
    if (!r.ok) { const txt=await r.text(); throw new Error(`DBX download ${path} ${r.status}: ${txt}`); }
    return r.text();
  }

  async function downloadData() {
    let txt = null;
    if (st.fileId) { const p=await getPathById(st.fileId); if(p) txt=await downloadPath(p); }
    if (!txt) txt = await downloadPath(PICKME_PATH);
    return txt;
  }

  async function disconnect() { try{await apiCall('/auth/token/revoke',null);}catch(e){} clearTokens(); }

  return { load, isConfigured, isConnected, account, startOAuth, handleCallback, uploadSmart, downloadData, disconnect };
})();
DBX.load();

// ─── CONSOLIDATED STATE KEY + AUTO SYNC ──────────────────────────────────────
const PICKME_STATE_KEY = 'pickme_state_v1';
let _dbxPushTimer = null;

function scheduleDropboxPush() {
  if (!DBX.isConnected()) return;
  clearTimeout(_dbxPushTimer);
  _dbxPushTimer = setTimeout(async () => {
    _dbxPushTimer = null;
    try {
      window.dispatchEvent(new CustomEvent('dbxSyncStatus', { detail: 'syncing' }));
      const raw = localStorage.getItem(PICKME_STATE_KEY);
      if (!raw) { window.dispatchEvent(new CustomEvent('dbxSyncStatus', { detail: 'idle' })); return; }
      await DBX.uploadSmart(raw);
      window.dispatchEvent(new CustomEvent('dbxSyncStatus', { detail: 'idle' }));
    } catch(e) {
      console.warn('Auto-push failed:', e);
      window.dispatchEvent(new CustomEvent('dbxSyncStatus', { detail: 'error' }));
    }
  }, 2000);
}

async function performDropboxPull() {
  if (!DBX.isConnected()) return false;
  try {
    const txt = await DBX.downloadData();
    if (!txt) return false;
    const remote = JSON.parse(txt);
    if (!remote.lastModified) return false;
    const localRaw = localStorage.getItem(PICKME_STATE_KEY);
    if (localRaw) {
      try {
        const local = JSON.parse(localRaw);
        if (local.lastModified && remote.lastModified <= local.lastModified) return false;
      } catch(e) {}
    }
    // Remote is newer — write to localStorage and notify React
    localStorage.setItem(PICKME_STATE_KEY, JSON.stringify(remote));
    window.dispatchEvent(new CustomEvent('pickme_state_updated', { detail: remote }));
    return true;
  } catch(e) {
    console.warn('DBX pull failed:', e);
    return false;
  }
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────

function computeVerdict(answers) {
  let keeps = 0, warns = 0, cuts = 0;
  const notes = [];

  QUESTIONS.forEach(q => {
    const ans = answers[q.id];
    if (ans === undefined) return;
    const flag = ans === "yes" ? q.flag_yes : q.flag_no;
    if (flag === "keep") keeps++;
    else if (flag === "warn") warns++;
    else if (flag === "cut") cuts++;
  });

  // Specific note logic
  if (answers["q_cut4"] === "yes") notes.push("The story holds without this scene — identify exactly what it's earning before you keep it.");
  if (answers["q_cut1"] === "no" && answers["q_cut2"] === "no" && answers["q_cut3"] === "no") notes.push("No relationship shift, no unique info, no obstacle. Strong cut candidate unless it's pure comedy that earns its place.");
  if (answers["q_momentum"] === "yes") notes.push("Pacing drag detected. What emotional payoff justifies the slowdown?");
  if (answers["q_voice"] === "no") notes.push("Autumn's voice feels off. Reconnect her to the wound: she wants to be wanted and can't believe she is.");
  if (answers["q_ethan_armor"] === "no" && answers["q_ethan_present"] === "yes") notes.push("Ethan's production armor is absent — is that a choice? His arc depends on this pattern being visible.");
  if (answers["q_ethan_agency"] === "yes") notes.push("Ethan is writing someone's ending for them. Flag intentional or unintentional — both matter.");
  if (answers["q_show_visibility"] === "no" && answers["q_show_check"] === "yes") notes.push("Show mechanic present but not interrogating Autumn's wound. The format should cost her something.");
  if (answers["q_green_flags"] === "no") notes.push("Green flag opportunity missed. Can Ethan do something small and specific here that Autumn deflects?");
  if (answers["q_panty_seat"] === "no") notes.push("No Panty Seat List root. Consider: which of the 30 truths does this scene speak to?");

  const _keepIcon = (
    <svg width="44" height="44" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="22" cy="22" r="20" fill="#D4EFDF" stroke="#1A5E30" strokeWidth="2.5"/>
      <path d="M12 22l7 8 13-16" stroke="#1A5E30" strokeWidth="3.5" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
  const _rewriteIcon = (
    <svg width="44" height="44" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="22" cy="22" r="20" fill="#F0D7A8" stroke="#B7560E" strokeWidth="2.5"/>
      <path d="M30 17a10 10 0 1 0 2 8" stroke="#B7560E" strokeWidth="3" strokeLinecap="round" fill="none"/>
      <path d="M31 10v8h-8" stroke="#B7560E" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" fill="none"/>
    </svg>
  );
  const _cutIcon = (
    <svg width="44" height="44" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="22" cy="22" r="20" fill="#FADBD8" stroke="#922B21" strokeWidth="2.5"/>
      <path d="M14 14l16 16M30 14L14 30" stroke="#922B21" strokeWidth="3.5" strokeLinecap="round"/>
    </svg>
  );
  let verdict, icon;
  const total = keeps + warns + cuts;
  if (cuts >= 2) { verdict = "cut"; icon = _cutIcon; }
  else if (warns >= 3 || (warns >= 2 && cuts >= 1)) { verdict = "rewrite"; icon = _rewriteIcon; }
  else if (keeps >= Math.ceil(total * 0.5)) { verdict = "keep"; icon = _keepIcon; }
  else { verdict = "rewrite"; icon = _rewriteIcon; }

  return { verdict, icon, keeps, warns, cuts, notes };
}

function formatPlaylistForNotion(songs) {
  const withMeaning = songs.filter(s => s.meaning.trim());
  if (!withMeaning.length) return "No meanings written yet.";
  return "# Pick Me Playlist — Story Notes\n\n" +
    withMeaning.map((s, i) =>
      `## ${i+1}. ${s.title} — ${s.artist}\n${s.meaning}`
    ).join("\n\n");
}

function formatNotesForNotion(notes) {
  if (!notes.length) return "No notes yet.";
  return "# Scene Notes\n\n" +
    notes.map(n =>
      `## Scene: ${n.scene || "Untitled"}\n${n.content}`
    ).join("\n\n---\n\n");
}

// ─── TOAST ───────────────────────────────────────────────────────────────────

function useToast() {
  const [msg, setMsg] = useState("");
  const [visible, setVisible] = useState(false);
  const timer = useRef(null);

  const show = useCallback((m) => {
    setMsg(m);
    setVisible(true);
    clearTimeout(timer.current);
    timer.current = setTimeout(() => setVisible(false), 2800);
  }, []);

  return { msg, visible, show };
}

// ─── PLAYLIST TAB ────────────────────────────────────────────────────────────

function PlaylistTab({ songs, setSongs, notionUrl, showToast }) {
  const [dragId, setDragId] = useState(null);
  const [overIdx, setOverIdx] = useState(null);

  const updateMeaning = (id, val) =>
    setSongs(prev => prev.map(s => s.id === id ? { ...s, meaning: val } : s));

  const deleteSong = (id) =>
    setSongs(prev => prev.filter(s => s.id !== id));

  const addSong = () => {
    const newSong = {
      id: Date.now(),
      title: "",
      artist: "",
      album: "",
      meaning: "",
      isNew: true
    };
    setSongs(prev => [newSong, ...prev]);
  };

  const handleDragStart = (e, id) => {
    setDragId(id);
    e.dataTransfer.effectAllowed = "move";
    e.dataTransfer.setData("text/html", "");
  };
  const handleDragOver = (e, idx) => {
    e.preventDefault();
    e.dataTransfer.dropEffect = "move";
    setOverIdx(idx);
  };
  const handleDrop = (e, targetIdx) => {
    e.preventDefault();
    e.stopPropagation();
    if (dragId === null) return;
    const fromIdx = songs.findIndex(s => s.id === dragId);
    if (fromIdx === targetIdx || fromIdx === -1) { setDragId(null); setOverIdx(null); return; }
    const next = [...songs];
    const [moved] = next.splice(fromIdx, 1);
    next.splice(targetIdx, 0, moved);
    setSongs(next);
    setDragId(null);
    setOverIdx(null);
  };
  const handleDragEnd = () => { setDragId(null); setOverIdx(null); };

  const copyToNotion = () => {
    const text = formatPlaylistForNotion(songs);
    navigator.clipboard.writeText(text).then(() => {
      window.open(notionUrl, "_blank");
      showToast("Copied! Paste into your Notion page 💋");
    });
  };

  const downloadTxt = () => {
    const text = formatPlaylistForNotion(songs);
    const a = document.createElement("a");
    a.href = "data:text/plain;charset=utf-8," + encodeURIComponent(text);
    a.download = "pick-me-playlist.txt";
    a.click();
  };

  return (
    <div>
      <div className="playlist-controls">
        <button className="btn btn-primary" onClick={copyToNotion}>✦ Copy & Open Notion</button>
        <button className="btn btn-secondary" onClick={downloadTxt}>⬇ Download .txt</button>
        <span className="song-count-badge">{songs.length} songs</span>
      </div>
      <p style={{fontSize:"0.82em",color:"var(--text-light)",marginBottom:"18px",fontStyle:"italic"}}>
        Drag the ≡ handle to reorder songs into story sequence.
      </p>
      <button onClick={addSong} style={{marginBottom:"16px",padding:"10px 16px",backgroundColor:"var(--neon-pink)",color:"white",border:"none",borderRadius:"4px",cursor:"pointer",fontWeight:"bold"}}>+ Add Song</button>
      <div className="songs-grid">
        {songs.map((song, idx) => (
          <div
            key={song.id}
            className={`song-card${dragId === song.id ? " dragging" : ""}${overIdx === idx && dragId !== song.id ? " drag-over" : ""}`}
            draggable
            onDragStart={e => handleDragStart(e, song.id)}
            onDragOver={e => handleDragOver(e, idx)}
            onDrop={e => handleDrop(e, idx)}
            onDragEnd={handleDragEnd}
          >
            <div className="drag-handle" title="Drag to reorder">
              <span/><span/><span/>
              <div className="song-num">{idx+1}</div>
            </div>
            <div className="song-icon">🎵</div>
            <div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <div>
                  <div className="song-title">{song.title}</div>
                  <div className="song-artist">{song.artist}</div>
                  <div className="song-album">{song.album}</div>
                </div>
                <button onClick={(e) => {e.stopPropagation(); deleteSong(song.id);}} style={{backgroundColor:"#f5d5d8",color:"#d9647f",border:"none",padding:"1px 4px",borderRadius:"2px",cursor:"pointer",fontWeight:"bold",fontSize:"14px",lineHeight:"1"}}>×</button>
              </div>
              {song.isNew && (
                <>
                  <input type="text" value={song.title} onChange={(e) => setSongs(prev => prev.map(s => s.id === song.id ? {...s, title: e.target.value, isNew: e.target.value ? true : true} : s))} placeholder="Song title..." style={{width:"100%",padding:"8px",marginBottom:"8px",border:"1px solid #ddd",borderRadius:"4px",fontSize:"0.95em"}} />
                  <input type="text" value={song.artist} onChange={(e) => setSongs(prev => prev.map(s => s.id === song.id ? {...s, artist: e.target.value} : s))} placeholder="Artist..." style={{width:"100%",padding:"8px",marginBottom:"8px",border:"1px solid #ddd",borderRadius:"4px",fontSize:"0.95em"}} />
                  <input type="text" value={song.album} onChange={(e) => setSongs(prev => prev.map(s => s.id === song.id ? {...s, album: e.target.value} : s))} placeholder="Album..." style={{width:"100%",padding:"8px",marginBottom:"8px",border:"1px solid #ddd",borderRadius:"4px",fontSize:"0.95em"}} />
                  <button onClick={() => {if(song.title.trim()) setSongs(prev => prev.map(s => s.id === song.id ? {...s, isNew: false} : s));}} disabled={!song.title.trim()} style={{backgroundColor:song.title.trim()?"var(--neon-pink)":"#ccc",color:"white",border:"none",padding:"8px 12px",borderRadius:"4px",cursor:song.title.trim()?"pointer":"not-allowed",fontWeight:"bold",fontSize:"0.95em",width:"100%",marginTop:"8px"}}>Save Song</button>
                </>
              )}
              <label className="meaning-label">What did this song inspire?</label>
              <textarea
                className="meaning-area"
                value={song.meaning}
                placeholder="What moment, feeling, or character truth does this song speak to..."
                onChange={e => updateMeaning(song.id, e.target.value)}
              />
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── SCENE EVALUATION TAB ────────────────────────────────────────────────────

function EvalTab({ notionUrl, showToast }) {
  const [step, setStep] = useState("setup"); // setup | categories | quiz | result
  const [sceneName, setSceneName] = useState("");
  const [selectedCats, setSelectedCats] = useState([]);
  const [qHistory, setQHistory] = useState([]);   // [{id, answer}]
  const [currentQId, setCurrentQId] = useState("q_cut1");
  const [answers, setAnswers] = useState({});
  const [evalNotes, setEvalNotes] = useState("");

  const toggleCat = id =>
    setSelectedCats(prev => prev.includes(id) ? prev.filter(c => c !== id) : [...prev, id]);

  const startCategories = () => {
    if (!sceneName.trim()) return;
    setStep("categories");
  };

  const startQuiz = () => {
    if (!selectedCats.length) return;
    setStep("quiz");
    setCurrentQId("q_cut1");
    setAnswers({});
    setQHistory([]);
  };

  const getQuestion = id => QUESTIONS.find(q => q.id === id);

  const answerQuestion = (ans) => {
    const q = getQuestion(currentQId);
    const newAnswers = { ...answers, [q.id]: ans };
    setAnswers(newAnswers);
    setQHistory(prev => [...prev, { id: q.id, answer: ans }]);

    const nextId = ans === "yes" ? q.next_yes : q.next_no;

    if (nextId === "result") {
      setStep("result");
      return;
    }

    // Skip ethan questions if ethan not present
    if (nextId === "q_ethan_armor" && newAnswers["q_ethan_present"] === "no") {
      advanceTo("q_show_check", newAnswers);
      return;
    }
    // Skip show_hbo if show_check is no
    if (nextId === "q_show_hbo" && newAnswers["q_show_check"] === "no") {
      advanceTo("q_green_flags", newAnswers);
      return;
    }

    setCurrentQId(nextId);
  };

  const advanceTo = (id, ans) => {
    setCurrentQId(id);
  };

  const goBack = () => {
    if (!qHistory.length) { setStep("categories"); return; }
    const prev = [...qHistory];
    const last = prev.pop();
    setQHistory(prev);
    const newAnswers = { ...answers };
    delete newAnswers[last.id];
    setAnswers(newAnswers);
    setCurrentQId(last.id);
    if (step === "result") setStep("quiz");
  };

  const restart = () => {
    setStep("setup");
    setSceneName("");
    setSelectedCats([]);
    setQHistory([]);
    setCurrentQId("q_cut1");
    setAnswers({});
    setEvalNotes("");
  };

  const copyResultToNotion = () => {
    const result = computeVerdict(answers);
    const verdictLabel = result.verdict === "keep" ? "KEEP" : result.verdict === "rewrite" ? "REWRITE" : "CUT";
    const text = `# Scene Evaluation: ${sceneName}\n\n**Verdict: ${verdictLabel}**\n\nKeep signals: ${result.keeps} | Warnings: ${result.warns} | Cut signals: ${result.cuts}\n\n## Notes\n${result.notes.join("\n")}\n\n## My Notes\n${evalNotes || "(none)"}`;
    navigator.clipboard.writeText(text).then(() => {
      window.open(notionUrl, "_blank");
      showToast("Evaluation copied! Paste into Notion 💋");
    });
  };

  // Progress calculation
  const totalQs = QUESTIONS.length;
  const answeredQs = qHistory.length;
  const progressPct = Math.round((answeredQs / totalQs) * 100);

  if (step === "setup") {
    return (
      <div className="eval-step0">
        <div className="section-title">Scene Evaluation</div>
        <div style={{marginBottom:"8px"}}>
          <label>What scene are we evaluating?</label>
          <input
            type="text"
            value={sceneName}
            placeholder="e.g. The Spa Scene, Samuel's Funeral, Drunk Show-Up..."
            onChange={e => setSceneName(e.target.value)}
            onKeyDown={e => e.key === "Enter" && startCategories()}
            style={{fontSize:"1.05em",padding:"12px 16px"}}
            autoFocus
          />
        </div>
        <p style={{fontSize:"0.82em",color:"var(--text-light)",marginBottom:"20px",fontStyle:"italic"}}>
          One scene at a time. Yes/no answers. You'll get an assessment at the end.
        </p>
        <button className="btn btn-primary" onClick={startCategories} disabled={!sceneName.trim()}>
          Begin Evaluation →
        </button>
      </div>
    );
  }

  if (step === "categories") {
    return (
      <div className="eval-categories">
        <div className="eval-step-label">Step 2 of 3 — Categorize</div>
        <div className="eval-scene-name">"{sceneName}"</div>
        <label style={{fontSize:"0.9em",marginBottom:"0"}}>What type of scene is this? <span style={{color:"var(--text-light)"}}>(select all that apply)</span></label>
        <div className="cat-grid">
          {CATEGORIES.map(cat => (
            <div
              key={cat.id}
              className={`cat-card${selectedCats.includes(cat.id) ? " selected" : ""}`}
              onClick={() => toggleCat(cat.id)}
            >
              <div className="cat-icon"><CategoryIcon id={cat.id} /></div>
              <div className="cat-name">{cat.name}</div>
              <div className="cat-desc">{cat.desc}</div>
            </div>
          ))}
        </div>
        <div style={{display:"flex",gap:"10px",alignItems:"center"}}>
          <button className="btn btn-secondary" onClick={() => setStep("setup")}>← Back</button>
          <button className="btn btn-primary" onClick={startQuiz} disabled={!selectedCats.length}>
            Start Questions →
          </button>
          {!selectedCats.length && <span style={{fontSize:"0.8em",color:"var(--text-light)",fontStyle:"italic"}}>Select at least one category</span>}
        </div>
      </div>
    );
  }

  if (step === "quiz") {
    const q = getQuestion(currentQId);
    if (!q) { setStep("result"); return null; }

    return (
      <div className="eval-question">
        <div className="eval-step-label">"{sceneName}"</div>

        <div className="progress-bar-wrap">
          <div className="progress-bar-fill" style={{width: `${progressPct}%`}} />
        </div>
        <div className="progress-label">Question {answeredQs + 1} · {progressPct}% complete</div>

        <div className="question-section">{q.section}</div>
        <div className="question-text">{q.text}</div>
        {q.sub && <div className="question-sub">{q.sub}</div>}

        <div className="quiz-btns">
          <button className="btn btn-yes" onClick={() => answerQuestion("yes")}>✓ Yes</button>
          <button className="btn btn-no" onClick={() => answerQuestion("no")}>✗ No</button>
        </div>

        <div style={{textAlign:"center",marginTop:"20px"}}>
          <button className="btn btn-skip" onClick={goBack}>← Back</button>
        </div>

        {/* Running flag tally */}
        {(() => {
          let k=0,w=0,c=0;
          Object.entries(answers).forEach(([qid, ans]) => {
            const qq = QUESTIONS.find(x => x.id === qid);
            if (!qq) return;
            const f = ans === "yes" ? qq.flag_yes : qq.flag_no;
            if (f === "keep") k++;
            else if (f === "warn") w++;
            else if (f === "cut") c++;
          });
          if (!k && !w && !c) return null;
          return (
            <div className="flag-strip">
              {k > 0 && <span className="flag-badge flag-keep">{k} keep</span>}
              {w > 0 && <span className="flag-badge flag-warn">{w} warn</span>}
              {c > 0 && <span className="flag-badge flag-cut">{c} cut</span>}
            </div>
          );
        })()}
      </div>
    );
  }

  if (step === "result") {
    const result = computeVerdict(answers);
    const verdictClass = `result-verdict verdict-${result.verdict}`;
    const verdictLabel = result.verdict === "keep" ? "KEEP IT" : result.verdict === "rewrite" ? "REWRITE" : "CUT IT";

    return (
      <div className="eval-result">
        <div className="eval-step-label">"{sceneName}"</div>

        <div className={verdictClass}>
          <div className="verdict-icon">{result.icon}</div>
          <div className="verdict-title">{verdictLabel}</div>
          <div className="flag-summary">
            <span className="flag-count fc-keep">{result.keeps} keep</span>
            <span className="flag-count fc-warn">{result.warns} warn</span>
            <span className="flag-count fc-cut">{result.cuts} cut</span>
          </div>
          {result.notes.length > 0 && (
            <ul className="verdict-notes" style={{textAlign:"left",marginTop:"14px"}}>
              {result.notes.map((n,i) => <li key={i}>{n}</li>)}
            </ul>
          )}
        </div>

        <div className="result-notes-area">
          <label>Your notes on this scene:</label>
          <textarea
            value={evalNotes}
            onChange={e => setEvalNotes(e.target.value)}
            placeholder="What did this surface? What's your instinct? What needs to change..."
          />
        </div>

        <div className="result-actions">
          <button className="btn btn-restart" onClick={goBack}>← Review Answers</button>
          <button className="btn btn-notion" onClick={copyResultToNotion}>✦ Copy & Open Notion</button>
          <button className="btn btn-primary" onClick={restart}>New Scene</button>
        </div>
      </div>
    );
  }

  return null;
}
